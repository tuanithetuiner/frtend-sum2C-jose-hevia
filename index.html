<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Jose - Restaurante y Catering</title>
    <!-- Vincula el archivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Chef Jose</h1>
        <p>Despierta tu apetito con nuestras delicias culinarias</p>
        <div class="cta-buttons">
            <a href="#menu">Ver Menú</a>
            <a href="#solicitar">Solicitar Reserva o Catering</a>
        </div>
    </header>

    <section id="menu" class="menu-section">
        <h2>Menú</h2>
        <div class="menu-grid">
            <div class="menu-card">
                <img src="dish1.jpg" alt="Plato 1">
                <div class="content">
                    <h3>Entrada 1</h3>
                    <p>Ingredientes principales: ...</p>
                    <p class="price">$10</p>
                </div>
            </div>
            <div class="menu-card">
                <img src="dish2.jpg" alt="Plato 2">
                <div class="content">
                    <h3>Plato Principal</h3>
                    <p>Ingredientes principales: ...</p>
                    <p class="price">$15</p>
                </div>
            </div>
        </div>
    </section>

    <section id="solicitar" class="form-section">
        <h2>Solicitud de Reserva o Catering</h2>
        <form>
            <fieldset>
                <legend>Tipo de Solicitud</legend>
                <label><input type="radio" name="tipo-solicitud" value="reserva" required> Reserva de mesa</label>
                <label><input type="radio" name="tipo-solicitud" value="catering" required> Servicio de catering</label>
            </fieldset>
            <fieldset>
                <legend>Datos del Evento</legend>
                <label for="fecha">Fecha *</label>
                <input type="date" id="fecha" name="fecha" required>
                <label for="hora">Hora *</label>
                <input type="time" id="hora" name="hora" required>
            </fieldset>
            <div class="actions">
                <button type="submit">Enviar</button>
                <button type="reset">Limpiar</button>
            </div>
        </form>
    </section>
</body>
</html>
